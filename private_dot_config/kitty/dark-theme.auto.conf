# vim:ft=kitty

## name: Aura Dark
## author: Adapted from OpenCode Aura theme
## blurb: A beautiful dark purple theme based on the Aura color palette.

#: The basic colors

foreground                      #edecee
background                      #15141b
selection_foreground            #edecee
selection_background            #3d375e


#: Cursor colors

cursor                          #a277ff
cursor_text_color               #15141b


#: URL underline color when hovering with mouse

url_color                       #82e2ff


#: kitty window border colors and terminal bell colors

active_border_color             #a277ff
inactive_border_color           #6d6a7e
bell_border_color               #ff6767
visual_bell_color               none


#: Tab bar colors

active_tab_foreground           #edecee
active_tab_background           #a277ff
inactive_tab_foreground         #6d6a7e
inactive_tab_background         #1c1b22
tab_bar_background              #110f18


#: Colors for marks (marked text in the terminal)

mark1_foreground #15141b
mark1_background #61ffca
mark2_foreground #15141b
mark2_background #ffca85
mark3_foreground #15141b
mark3_background #a277ff


