# vim:ft=kitty

## name: Aura Light
## author: Adapted from OpenCode Aura theme
## blurb: A beautiful light purple theme based on the Aura color palette.

#: The basic colors

foreground                      #2d2640
background                      #f5f0ff
selection_foreground            #2d2640
selection_background            #d8d0eb


#: Cursor colors

cursor                          #a277ff
cursor_text_color               #f5f0ff


#: URL underline color when hovering with mouse

url_color                       #2f78b8


#: kitty window border colors and terminal bell colors

active_border_color             #a277ff
inactive_border_color           #8d88a3
bell_border_color               #d94f4f
visual_bell_color               none


#: Tab bar colors

active_tab_foreground           #f5f0ff
active_tab_background           #7b5ae0
inactive_tab_foreground         #8d88a3
inactive_tab_background         #e8e0f5
tab_bar_background              #ede6fa


#: Colors for marks (marked text in the terminal)

mark1_foreground #f5f0ff
mark1_background #2b8a57
mark2_foreground #f5f0ff
mark2_background #a96a22
mark3_foreground #f5f0ff
mark3_background #7b5ae0


